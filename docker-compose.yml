services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src    # hot-reload: edits to src/ reflect immediately
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8042:8042"
    volumes:
      - ./progress.json:/app/progress.json    # persist progress across container restarts
